<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>《波斯市場》音樂遊戲</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f6f3ee;
      margin: 0;
      color: #333;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 30px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #c98942;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.92;
    }

    .secondary-btn {
      background: #8c9aa5;
    }

    .danger-btn {
      background: #b85858;
    }

    .game-section {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .hidden {
      display: none;
    }

    .card {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .audio-label {
      font-weight: bold;
      min-width: 90px;
    }

    select {
      padding: 8px;
      border-radius: 6px;
      font-size: 15px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .sort-instruction {
      text-align: center;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .sort-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .sort-item {
      border: 2px solid #ddd;
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      cursor: move;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      user-select: none;
    }

    .sort-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .sort-item audio,
    .sort-item button,
    .sort-item select,
    .sort-item option {
      user-select: auto;
    }

    .sort-item.dragging {
      opacity: 0.55;
      border-color: #c98942;
    }

    .sort-item.correct {
      border-color: #2e9d55;
      background: #eefaf2;
    }

    .sort-item.wrong {
      border-color: #d84b4b;
      background: #fff1f1;
    }

    .sort-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 10px;
    }

    .sort-order {
      font-weight: bold;
      color: #555;
    }

    .result-text {
      font-weight: bold;
      margin-left: 6px;
    }

    .summary-box {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 17px;
    }

    .note {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-top: 8px;
    }

    .playlist-box {
      border: 1px solid #ead7bf;
      background: #fff8ef;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
    }

    .playlist-title {
      font-weight: bold;
      text-align: center;
      margin-bottom: 12px;
      font-size: 17px;
    }

    .playlist-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .playlist-status {
      text-align: center;
      margin-top: 12px;
      font-weight: bold;
      color: #7a4d20;
      line-height: 1.6;
    }

    .now-playing {
      color: #2d6a9f;
    }

    @media (max-width: 640px) {
      audio {
        width: 100%;
      }

      .row {
        align-items: flex-start;
      }

      .audio-label {
        min-width: auto;
      }

      button {
        width: 100%;
      }

      .playlist-controls button,
      .action-row button,
      .menu button {
        width: calc(50% - 8px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>《波斯市場》音樂互動遊戲</h1>

    <div class="menu">
      <button id="show-match">角色配對</button>
      <button id="show-sort">音樂排序</button>
    </div>

    <section id="match-game" class="game-section">
      <h2>遊戲一：角色配對</h2>
      <p class="sort-instruction">請聆聽每一段音樂，選出對應的角色。</p>

      <div class="playlist-box">
        <div class="playlist-title">角色配對播放列（依第一段到第十一段連播）</div>
        <div class="playlist-controls">
          <button id="match-play">播放</button>
          <button id="match-pause" class="secondary-btn">暫停</button>
          <button id="match-prev" class="secondary-btn">上一首</button>
          <button id="match-next" class="secondary-btn">下一首</button>
          <button id="match-stop" class="danger-btn">停止</button>
        </div>
        <div id="match-status" class="playlist-status">尚未播放</div>
      </div>

      <div id="match-list"></div>
    </section>

    <section id="sort-game" class="game-section hidden">
      <h2>遊戲二：音樂排序</h2>
      <p class="sort-instruction">
        請拖曳下列音樂片段，排出《波斯市場》的正確順序。<br>
        可先播放每段音樂，再上下調整位置。
      </p>

      <div class="playlist-box">
        <div class="playlist-title">音樂排序播放列（依目前位置 1 到 11 連播）</div>
        <div class="playlist-controls">
          <button id="sort-play">播放</button>
          <button id="sort-pause" class="secondary-btn">暫停</button>
          <button id="sort-prev" class="secondary-btn">上一首</button>
          <button id="sort-next" class="secondary-btn">下一首</button>
          <button id="sort-stop" class="danger-btn">停止</button>
        </div>
        <div id="sort-status" class="playlist-status">尚未播放</div>
      </div>

      <div class="action-row">
        <button id="shuffle-sort">重新打亂</button>
        <button id="check-sort">檢查排序答案</button>
        <button id="reset-sort-style" class="secondary-btn">清除標記</button>
      </div>
      <div id="sort-list" class="sort-list"></div>
      <div id="sort-summary" class="summary-box"></div>
      <div class="note">提示：現在整張卡片都比較容易拖曳，播放器本身仍可正常操作。</div>
    </section>
  </div>

  <script>
    const showMatchBtn = document.getElementById("show-match");
    const showSortBtn = document.getElementById("show-sort");
    const matchGame = document.getElementById("match-game");
    const sortGame = document.getElementById("sort-game");
    const matchList = document.getElementById("match-list");
    const sortList = document.getElementById("sort-list");
    const sortSummary = document.getElementById("sort-summary");
    const matchStatus = document.getElementById("match-status");
    const sortStatus = document.getElementById("sort-status");

    const roles = ["吹蛇人", "婚宴樂師", "公主", "乞丐", "駱駝商隊", "酋長"];

    const segments = [
      { id: 1, file: "audio/1.mp3", answerRole: "駱駝商隊" },
      { id: 2, file: "audio/2.mp3", answerRole: "乞丐" },
      { id: 3, file: "audio/3.mp3", answerRole: "公主" },
      { id: 4, file: "audio/4.mp3", answerRole: "吹蛇人" },
      { id: 5, file: "audio/5.mp3", answerRole: "婚宴樂師" },
      { id: 6, file: "audio/6.mp3", answerRole: "酋長" },
      { id: 7, file: "audio/7.mp3", answerRole: "駱駝商隊" },
      { id: 8, file: "audio/8.mp3", answerRole: "公主" },
      { id: 9, file: "audio/9.mp3", answerRole: "吹蛇人" },
      { id: 10, file: "audio/10.mp3", answerRole: "乞丐" },
      { id: 11, file: "audio/11.mp3", answerRole: "酋長" }
    ];

    let sortSegments = [];

    showMatchBtn.addEventListener("click", () => {
      matchGame.classList.remove("hidden");
      sortGame.classList.add("hidden");
    });

    showSortBtn.addEventListener("click", () => {
      sortGame.classList.remove("hidden");
      matchGame.classList.add("hidden");
    });

    function toChineseNumber(num) {
      const map = {
        1: "一", 2: "二", 3: "三", 4: "四", 5: "五", 6: "六",
        7: "七", 8: "八", 9: "九", 10: "十", 11: "十一"
      };
      return map[num] || num;
    }

    // -------------------------
    // 共用播放控制
    // -------------------------
    const playlistPlayer = new Audio();
    let currentPlaylistType = null;
    let currentPlaylistIndex = 0;
    let isPlaylistStopped = true;

    function stopAllInlineAudio() {
      document.querySelectorAll("audio").forEach(audio => {
        audio.pause();
      });
    }

    function getPlaylistByType(type) {
      if (type === "match") return segments;
      if (type === "sort") return sortSegments;
      return [];
    }

    function getStatusElement(type) {
      return type === "match" ? matchStatus : sortStatus;
    }

    function updatePlaylistStatus(type, text) {
      getStatusElement(type).innerHTML = text;
    }

    function playPlaylist(type, startIndex = null) {
      stopAllInlineAudio();

      if (currentPlaylistType !== type && !playlistPlayer.paused) {
        playlistPlayer.pause();
      }

      currentPlaylistType = type;
      const list = getPlaylistByType(type);

      if (!list.length) {
        updatePlaylistStatus(type, "沒有可播放的音樂");
        return;
      }

      if (startIndex !== null) {
        currentPlaylistIndex = startIndex;
      } else if (currentPlaylistIndex >= list.length) {
        currentPlaylistIndex = 0;
      }

      const segment = list[currentPlaylistIndex];
      if (!segment) return;

      playlistPlayer.src = segment.file;
      playlistPlayer.play()
        .then(() => {
          isPlaylistStopped = false;
          updatePlaylistStatus(
            type,
            `正在播放：<span class="now-playing">第${toChineseNumber(segment.id)}段</span>（第 ${currentPlaylistIndex + 1} 首 / 共 ${list.length} 首）`
          );
        })
        .catch(() => {
          updatePlaylistStatus(type, "播放失敗，請確認音檔存在且檔名正確");
        });
    }

    function pausePlaylist(type) {
      if (currentPlaylistType !== type) {
        updatePlaylistStatus(type, "目前不是這個播放列在播放");
        return;
      }
      playlistPlayer.pause();
      const list = getPlaylistByType(type);
      const segment = list[currentPlaylistIndex];
      if (segment) {
        updatePlaylistStatus(
          type,
          `已暫停：<span class="now-playing">第${toChineseNumber(segment.id)}段</span>`
        );
      } else {
        updatePlaylistStatus(type, "已暫停");
      }
    }

    function stopPlaylist(type) {
      if (currentPlaylistType !== type && currentPlaylistType !== null) {
        updatePlaylistStatus(type, "目前不是這個播放列在播放");
        return;
      }
      playlistPlayer.pause();
      playlistPlayer.currentTime = 0;
      isPlaylistStopped = true;
      currentPlaylistType = type;
      currentPlaylistIndex = 0;
      updatePlaylistStatus(type, "已停止");
    }

    function nextTrack(type) {
      const list = getPlaylistByType(type);
      if (!list.length) return;

      if (currentPlaylistType !== type || isPlaylistStopped) {
        currentPlaylistType = type;
        currentPlaylistIndex = 0;
        playPlaylist(type, currentPlaylistIndex);
        return;
      }

      currentPlaylistIndex++;
      if (currentPlaylistIndex >= list.length) {
        currentPlaylistIndex = list.length - 1;
        updatePlaylistStatus(type, "已經是最後一首");
        return;
      }

      playPlaylist(type, currentPlaylistIndex);
    }

    function prevTrack(type) {
      const list = getPlaylistByType(type);
      if (!list.length) return;

      if (currentPlaylistType !== type || isPlaylistStopped) {
        currentPlaylistType = type;
        currentPlaylistIndex = 0;
        playPlaylist(type, currentPlaylistIndex);
        return;
      }

      currentPlaylistIndex--;
      if (currentPlaylistIndex < 0) {
        currentPlaylistIndex = 0;
        updatePlaylistStatus(type, "已經是第一首");
        return;
      }

      playPlaylist(type, currentPlaylistIndex);
    }

    playlistPlayer.addEventListener("ended", () => {
      if (!currentPlaylistType) return;

      const list = getPlaylistByType(currentPlaylistType);
      currentPlaylistIndex++;

      if (currentPlaylistIndex < list.length) {
        playPlaylist(currentPlaylistType, currentPlaylistIndex);
      } else {
        updatePlaylistStatus(currentPlaylistType, "播放完成");
        isPlaylistStopped = true;
        currentPlaylistIndex = 0;
      }
    });

    // -------------------------
    // 角色配對
    // -------------------------
    function renderMatchGame() {
      matchList.innerHTML = "";

      segments.forEach((segment) => {
        const card = document.createElement("div");
        card.className = "card";

        const roleOptions = roles.map(role => `<option value="${role}">${role}</option>`).join("");

        card.innerHTML = `
          <div class="row">
            <span class="audio-label">第${toChineseNumber(segment.id)}段</span>
            <audio controls src="${segment.file}"></audio>
            <select id="role-${segment.id}">
              <option value="">請選擇角色</option>
              ${roleOptions}
            </select>
            <span id="result-${segment.id}" class="result-text"></span>
          </div>
        `;

        matchList.appendChild(card);
      });

      const actionRow = document.createElement("div");
      actionRow.className = "action-row";

      const checkBtn = document.createElement("button");
      checkBtn.textContent = "檢查答案";
      checkBtn.addEventListener("click", checkMatchAnswers);

      const resetBtn = document.createElement("button");
      resetBtn.textContent = "重新開始";
      resetBtn.className = "secondary-btn";
      resetBtn.addEventListener("click", renderMatchGame);

      actionRow.appendChild(checkBtn);
      actionRow.appendChild(resetBtn);
      matchList.appendChild(actionRow);
    }

    function checkMatchAnswers() {
      segments.forEach((segment) => {
        const selected = document.getElementById(`role-${segment.id}`).value;
        const result = document.getElementById(`result-${segment.id}`);

        if (!selected) {
          result.textContent = "未作答";
          result.style.color = "gray";
        } else if (selected === segment.answerRole) {
          result.textContent = "✔ 正確";
          result.style.color = "green";
        } else {
          result.textContent = "✘ 錯誤";
          result.style.color = "red";
        }
      });
    }

    // -------------------------
    // 音樂排序
    // -------------------------
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSortGame() {
      sortSegments = shuffleArray(segments);
      renderSortGame();
      sortSummary.textContent = "";
      if (currentPlaylistType === "sort") {
        stopPlaylist("sort");
      }
      updatePlaylistStatus("sort", "尚未播放");
    }

    function renderSortGame() {
      sortList.innerHTML = "";

      sortSegments.forEach((segment, index) => {
        const item = document.createElement("div");
        item.className = "sort-item";
        item.draggable = true;
        item.dataset.id = segment.id;
        item.dataset.index = index;

        item.innerHTML = `
          <div class="sort-top">
            <span class="sort-order">目前位置 ${index + 1}</span>
          </div>
          <div class="row">
            <span class="audio-label">第${toChineseNumber(segment.id)}段</span>
            <audio controls src="${segment.file}"></audio>
          </div>
        `;

        addDragEvents(item);
        sortList.appendChild(item);
      });
    }

    let draggedItem = null;

    function addDragEvents(item) {
      item.addEventListener("dragstart", (e) => {
        const tag = e.target.tagName.toLowerCase();

        if (tag === "audio") {
          e.preventDefault();
          return;
        }

        draggedItem = item;
        item.classList.add("dragging");
      });

      item.addEventListener("dragend", () => {
        item.classList.remove("dragging");
        draggedItem = null;
        updateSortArrayFromDOM();
        refreshDisplayedOrder();

        if (currentPlaylistType === "sort" && !isPlaylistStopped) {
          updatePlaylistStatus("sort", "排序已變動，若要依新順序播放，請按停止後再播放");
        }
      });

      item.addEventListener("dragover", (e) => {
        e.preventDefault();
      });

      item.addEventListener("drop", (e) => {
        e.preventDefault();
        if (!draggedItem || draggedItem === item) return;

        const items = [...sortList.querySelectorAll(".sort-item")];
        const draggedIndex = items.indexOf(draggedItem);
        const targetIndex = items.indexOf(item);

        if (draggedIndex < targetIndex) {
          sortList.insertBefore(draggedItem, item.nextSibling);
        } else {
          sortList.insertBefore(draggedItem, item);
        }

        updateSortArrayFromDOM();
        refreshDisplayedOrder();
      });
    }

    function updateSortArrayFromDOM() {
      const items = [...sortList.querySelectorAll(".sort-item")];
      const newOrder = items.map(item => {
        const id = Number(item.dataset.id);
        return segments.find(seg => seg.id === id);
      });
      sortSegments = newOrder;
    }

    function refreshDisplayedOrder() {
      const items = [...sortList.querySelectorAll(".sort-item")];
      items.forEach((item, index) => {
        const orderText = item.querySelector(".sort-order");
        orderText.textContent = `目前位置 ${index + 1}`;
      });
    }

    function checkSortAnswers() {
      const items = [...sortList.querySelectorAll(".sort-item")];
      let correctCount = 0;

      items.forEach((item, index) => {
        const currentId = Number(item.dataset.id);
        const correctId = segments[index].id;

        item.classList.remove("correct", "wrong");

        if (currentId === correctId) {
          item.classList.add("correct");
          correctCount++;
        } else {
          item.classList.add("wrong");
        }
      });

      if (correctCount === segments.length) {
        sortSummary.textContent = "🎉 全部正確！排序完成。";
        sortSummary.style.color = "green";
      } else {
        sortSummary.textContent = `目前答對 ${correctCount} / ${segments.length}`;
        sortSummary.style.color = "#c05a00";
      }
    }

    function clearSortStyles() {
      const items = [...sortList.querySelectorAll(".sort-item")];
      items.forEach(item => item.classList.remove("correct", "wrong"));
      sortSummary.textContent = "";
    }

    // -------------------------
    // 綁定按鈕
    // -------------------------
    document.getElementById("shuffle-sort").addEventListener("click", initSortGame);
    document.getElementById("check-sort").addEventListener("click", checkSortAnswers);
    document.getElementById("reset-sort-style").addEventListener("click", clearSortStyles);

    document.getElementById("match-play").addEventListener("click", () => playPlaylist("match", currentPlaylistType === "match" && !isPlaylistStopped ? currentPlaylistIndex : 0));
    document.getElementById("match-pause").addEventListener("click", () => pausePlaylist("match"));
    document.getElementById("match-prev").addEventListener("click", () => prevTrack("match"));
    document.getElementById("match-next").addEventListener("click", () => nextTrack("match"));
    document.getElementById("match-stop").addEventListener("click", () => stopPlaylist("match"));

    document.getElementById("sort-play").addEventListener("click", () => playPlaylist("sort", currentPlaylistType === "sort" && !isPlaylistStopped ? currentPlaylistIndex : 0));
    document.getElementById("sort-pause").addEventListener("click", () => pausePlaylist("sort"));
    document.getElementById("sort-prev").addEventListener("click", () => prevTrack("sort"));
    document.getElementById("sort-next").addEventListener("click", () => nextTrack("sort"));
    document.getElementById("sort-stop").addEventListener("click", () => stopPlaylist("sort"));

    renderMatchGame();
    initSortGame();
    updatePlaylistStatus("match", "尚未播放");
    updatePlaylistStatus("sort", "尚未播放");
  </script>
</body>
</html>
